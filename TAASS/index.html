<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ayano | Link Page</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at bottom, #ffffff 0%, #000000 70%);
        color: #ffffff;
        min-height: 100vh;
        overflow: hidden;
    }

    /* ดาว */
    .stars {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
    }

    .star {
        position: absolute;
        bottom: -10px;
        width: 2px;
        height: 2px;
        background: #fff;
        opacity: 0.8;
        border-radius: 50%;
        animation: floatUp linear infinite;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(0);
            opacity: 0;
        }
        10% {
            opacity: 1;
        }
        100% {
            transform: translateY(-110vh);
            opacity: 0;
        }
    }

    .container {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 420px;
        margin: auto;
        padding: 24px;
        text-align: center;
    }

    .profile img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #fff;
        margin-bottom: 12px;
    }

    .profile h1 {
        margin: 10px 0 32px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .link {
        display: flex;
        align-items: center;
        gap: 14px;
        background: rgba(255,255,255,0.08);
        color: #fff;
        text-decoration: none;
        padding: 16px 20px;
        border-radius: 18px;
        margin-bottom: 18px;
        font-size: 16px;
        font-weight: 500;
        backdrop-filter: blur(6px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        transition: all 0.3s ease;
    }

    .link img {
        width: 30px;
        height: 30px;
        filter: invert(1);
    }

    .link:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 18px 40px rgba(0,0,0,0.9);
        background: rgba(255,255,255,0.14);
    }

    .footer {
        margin-top: 42px;
        font-size: 12px;
        color: #aaa;
        letter-spacing: 1px;
    }
</style>
</head>

<body>

<!-- ดาว -->
<div class="stars">
    <div class="star" style="left:5%;  animation-duration: 12s;"></div>
    <div class="star" style="left:15%; animation-duration: 18s;"></div>
    <div class="star" style="left:25%; animation-duration: 14s;"></div>
    <div class="star" style="left:35%; animation-duration: 22s;"></div>
    <div class="star" style="left:45%; animation-duration: 16s;"></div>
    <div class="star" style="left:55%; animation-duration: 20s;"></div>
    <div class="star" style="left:65%; animation-duration: 13s;"></div>
    <div class="star" style="left:75%; animation-duration: 24s;"></div>
    <div class="star" style="left:85%; animation-duration: 15s;"></div>
    <div class="star" style="left:95%; animation-duration: 19s;"></div>
</div>

<div class="container">

    <div class="profile">
        <img src="img/0dae2c5e-6d0c-465d-944b-d3330562a382.jpg">
        <h1>Ayano</h1>
    </div>

    <a class="link" href="https://ezdn.app/ayano_i9" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/paypal.svg">
        Donate
    </a>

    <a class="link" href="https://discord.gg/WAfdph7S4" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">
        Discord Server
    </a>

    <a class="link" href="https://www.roblox.com/share?code=366861ee637afa488de63d0e2f9959bb&type=Server">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/roblox.svg">
        Link Server
    </a>


</div>

</body>
</html>
